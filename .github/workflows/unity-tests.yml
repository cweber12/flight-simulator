name: Unity Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  UNITY_VERSION: 6000.1.14f1
  HAS_UNITY_LICENSE: ${{ secrets.UNITY_LICENSE != '' }}
  HAS_UNITY_SERIAL: ${{ secrets.UNITY_SERIAL != '' }}
  HAS_UNITY_EMAIL: ${{ secrets.UNITY_EMAIL != '' }}
  HAS_UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD != '' }}
  HAS_PERSONAL_LICENSE: ${{ secrets.UNITY_LICENSE != '' && secrets.UNITY_EMAIL != '' && secrets.UNITY_PASSWORD != '' }}
  HAS_PRO_LICENSE: ${{ secrets.UNITY_SERIAL != '' && secrets.UNITY_EMAIL != '' && secrets.UNITY_PASSWORD != '' }}
  HAS_BOTH_LICENSE_TYPES: ${{ secrets.UNITY_LICENSE != '' && secrets.UNITY_SERIAL != '' }}

jobs:
  repository-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify generated Unity folders are not tracked
        shell: bash
        run: |
          set -euo pipefail
          tracked_generated_files="$(git ls-files Library Temp Obj Logs UserSettings Build Builds || true)"
          if [ -n "$tracked_generated_files" ]; then
            echo "Generated Unity files are tracked and should be removed from Git:"
            echo "$tracked_generated_files"
            exit 1
          fi

      - name: Verify FlightX runtime scripts avoid old input polling
        shell: bash
        run: |
          set -euo pipefail
          if grep -R "Input\.Get" Assets/FlightX/Scripts; then
            echo "Old Unity Input polling was found under Assets/FlightX/Scripts."
            exit 1
          fi

  unity-tests:
    name: Unity ${{ matrix.testMode }} Tests
    runs-on: ubuntu-latest
    needs: repository-hygiene
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - editmode
          - playmode
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Unity license secret combination
        shell: bash
        run: |
          set -euo pipefail

          if [ "$HAS_UNITY_LICENSE" = "true" ] && [ "$HAS_UNITY_SERIAL" = "true" ]; then
            echo "Both UNITY_LICENSE and UNITY_SERIAL are configured."
            echo "Use exactly one Unity activation mode for CI:"
            echo "- Personal/ULF activation: UNITY_LICENSE, UNITY_EMAIL, and UNITY_PASSWORD."
            echo "- Pro serial activation: UNITY_SERIAL, UNITY_EMAIL, and UNITY_PASSWORD."
            exit 1
          fi

          if [ "$HAS_UNITY_LICENSE" = "true" ]; then
            if [ "$HAS_UNITY_EMAIL" != "true" ] || [ "$HAS_UNITY_PASSWORD" != "true" ]; then
              echo "Personal/ULF activation is incomplete."
              echo "Add UNITY_LICENSE, UNITY_EMAIL, and UNITY_PASSWORD as GitHub Actions secrets."
              exit 1
            fi

            echo "Unity activation mode: Personal/ULF."
            exit 0
          fi

          if [ "$HAS_UNITY_SERIAL" = "true" ]; then
            if [ "$HAS_UNITY_EMAIL" != "true" ] || [ "$HAS_UNITY_PASSWORD" != "true" ]; then
              echo "Pro serial activation is incomplete."
              echo "Add UNITY_SERIAL, UNITY_EMAIL, and UNITY_PASSWORD as GitHub Actions secrets."
              exit 1
            fi

            echo "Unity activation mode: Pro serial."
            exit 0
          fi

          echo "No Unity activation strategy is configured."
          echo "For Personal/ULF activation, add UNITY_LICENSE, UNITY_EMAIL, and UNITY_PASSWORD."
          echo "For Pro serial activation, add UNITY_SERIAL, UNITY_EMAIL, and UNITY_PASSWORD."
          exit 1

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ matrix.testMode }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-${{ matrix.testMode }}-
            Library-${{ runner.os }}-${{ env.UNITY_VERSION }}-

      - name: Run Unity tests with Personal license file
        if: env.HAS_PERSONAL_LICENSE == 'true' && env.HAS_PRO_LICENSE != 'true' && env.HAS_BOTH_LICENSE_TYPES != 'true'
        uses: game-ci/unity-test-runner@v4.3.1
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: ${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Unity tests with Pro serial
        if: env.HAS_PRO_LICENSE == 'true' && env.HAS_PERSONAL_LICENSE != 'true' && env.HAS_BOTH_LICENSE_TYPES != 'true'
        uses: game-ci/unity-test-runner@v4.3.1
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: .
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: ${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Unity test results
        if: always() && (env.HAS_PERSONAL_LICENSE == 'true' || env.HAS_PRO_LICENSE == 'true') && env.HAS_BOTH_LICENSE_TYPES != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: unity-${{ matrix.testMode }}-test-results
          path: artifacts
          if-no-files-found: ignore
